version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: surveillance_postgres
    restart: always
    environment:
      POSTGRES_USER: surveillance_user
      POSTGRES_PASSWORD: surveillance_password
      POSTGRES_DB: surveillance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  postgres_data:
